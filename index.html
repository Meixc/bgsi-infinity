<!DOCTYPE html>
<html>
<head>
    <title>BGSI Infinity</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 200px; background: var(--card); border-right: 1px solid var(--border); padding: 15px; }
        #content { flex: 1; padding: 25px; overflow-y: auto; }
        #chat-side { width: 280px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-btn { padding: 12px; cursor: pointer; border-radius: 8px; color: #888; margin-bottom: 5px; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); font-weight: bold; }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-main:disabled { background: #444; color: #888; cursor: not-allowed; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        
        /* 3D COIN */
        #coin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .coin { width: 120px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 3s cubic-bezier(0.1, 1, 0.2, 1); }
        .side { position: absolute; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; border: 4px solid #ffd700; backface-visibility: hidden; }
        .heads { background: gold; color: #fff; transform: rotateY(0deg); }
        .tails { background: silver; color: #fff; transform: rotateY(180deg); }
        
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .msg-owner { border-left: 3px solid var(--owner); padding-left: 8px; color: var(--owner); margin-bottom: 4px; }
        .hidden { display: none !important; }
        #podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; height: 120px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="coin-overlay">
    <div id="coin-box" class="coin"><div class="side heads">H</div><div class="side tails">T</div></div>
    <h2 id="winner-text" style="margin-top: 40px; color: var(--accent);">FLIPPING...</h2>
</div>

<header>
    <div style="font-weight:bold; color:var(--accent);">BGSI INFINITY</div>
    <div style="display:flex; align-items:center; gap:10px;"><span id="u-name">Guest</span><img id="u-pfp" style="width:30px; border-radius:50%;"></div>
</header>

<div class="main-layout">
    <div id="sidebar">
        <div class="nav-btn active" onclick="tab('dash')">Dash</div>
        <div class="nav-btn" onclick="tab('click')">Clicker</div>
        <div class="nav-btn" onclick="tab('flip')">Flip</div>
        <div id="adm-btn" class="nav-btn hidden" onclick="tab('adm')" style="color:var(--owner);">ADMIN</div>
    </div>
    <div id="content">
        <div id="tab-dash">
            <div style="display:flex; gap:10px;">
                <div style="background:var(--card); padding:15px; flex:1; border-radius:10px; border:1px solid var(--border);">
                    <small>GEMS</small><h2 id="b-txt" style="color:var(--accent); margin:0;">0</h2>
                </div>
                <div style="background:var(--card); padding:15px; flex:1; border-radius:10px; border:1px solid var(--border);">
                    <small>WAGERED</small><h2 id="w-txt" style="margin:0;">0</h2>
                </div>
            </div>
            <div id="podium"></div>
        </div>
        <div id="tab-click" class="hidden" style="text-align:center;">
            <div onclick="window.clickGem()" style="font-size:100px; cursor:pointer;">💎</div>
        </div>
        <div id="tab-flip" class="hidden">
            <input id="f-amt" type="number" placeholder="Bet Amount">
            <button class="btn-main" onclick="window.createFlip()">HOST GAME</button>
            <div id="f-list" style="margin-top:20px;"></div>
        </div>
        <div id="tab-adm" class="hidden">
            <input id="a-id" placeholder="Roblox ID">
            <input id="a-qty" type="number" placeholder="Amount">
            <button class="btn-main" onclick="window.admGive()">GIVE GEMS</button>
            <button class="btn-main" onclick="window.admBan()" style="background:#ff4444; color:#fff; margin-top:10px;">BAN USER</button>
        </div>
    </div>
    <div id="chat-side">
        <div id="chat-msgs"></div>
        <div style="padding:10px;">
            <input id="c-in" placeholder="Message..." onkeypress="if(event.key==='Enter')window.sendMsg()">
            <button id="c-btn" class="btn-main" onclick="window.sendMsg()">SEND (2s)</button>
        </div>
    </div>
</div>

<div id="auth" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:99999;">
    <div style="background:var(--card); padding:40px; border-radius:10px; width:280px; text-align:center;">
        <div id="s1"><input id="l-u" placeholder="Username"><input id="l-i" placeholder="User ID"><button class="btn-main" onclick="window.next()">NEXT</button></div>
        <div id="s2" class="hidden"><p>Bio Code:</p><h1 id="c-txt" style="color:var(--accent);"></h1><button class="btn-main" onclick="window.verify()">VERIFY</button></div>
    </div>
</div>

<script>
    const socket = io("https://bgsi-infinity.onrender.com");
    const OWNER_ID = "7957630713";
    let me = JSON.parse(localStorage.getItem('user_session'));
    let chatCooldown = false;

    // --- ACCESS REDIRECT ---
    if(me) {
        const urlParams = new URLSearchParams(window.location.search);
        if(!urlParams.has('uid')) {
            window.location.search = `uid=${me.userId}`;
        }
    }

    function tab(t) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
    }

    socket.on('flip_results', d => {
        const overlay = document.getElementById('coin-overlay');
        const coin = document.getElementById('coin-box');
        overlay.style.display = 'flex';
        coin.style.transform = 'rotateY(0deg)';
        setTimeout(() => {
            coin.style.transform = d.resultSide === 'Heads' ? 'rotateY(1800deg)' : 'rotateY(1980deg)';
            setTimeout(() => {
                document.getElementById('winner-text').innerText = d.winnerName + " WON!";
                setTimeout(() => { overlay.style.display='none'; document.getElementById('winner-text').innerText="FLIPPING..."; loadLB(); }, 2000);
            }, 3100);
        }, 50);
    });

    socket.on('force_disconnect', d => { if(me && String(me.userId) === String(d.userId)) { localStorage.clear(); location.reload(); } });

    async function loadLB() {
        const res = await fetch("/api/leaderboard");
        const top = await res.json();
        const p = document.getElementById('podium');
        const visual = [top[1], top[0], top[2]].filter(x => x);
        const colors = {1:"gold", 2:"silver", 3:"#cd7f32"};
        p.innerHTML = visual.map(u => `<div style="text-align:center;"><div style="font-size:10px;">${u.username}</div><div style="background:${colors[u.rank]}; height:${u.rank==1?'60px':'40px'}; width:40px; border-radius:4px 4px 0 0; color:#000; font-weight:bold; display:flex; align-items:center; justify-content:center; font-size:12px;">#${u.rank}</div></div>`).join('');
    }

    window.next = () => {
        window.temp = { username: document.getElementById('l-u').value, userId: document.getElementById('l-i').value, code: "BGS-"+Math.floor(Math.random()*999) };
        document.getElementById('c-txt').innerText = window.temp.code;
        document.getElementById('s1').classList.add('hidden'); document.getElementById('s2').classList.remove('hidden');
    };

    window.verify = async () => {
        const res = await fetch("/api/verify-bio", { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...window.temp, expectedCode:window.temp.code}) });
        const d = await res.json();
        if(d.success) {
            me = { ...d.data, userId: window.temp.userId, pfp: `https://www.roblox.com/headshot-thumbnail/image?userId=${window.temp.userId}&width=150&height=150&format=png` };
            localStorage.setItem('user_session', JSON.stringify(me)); location.reload();
        } else alert(d.message);
    };

    window.sendMsg = () => {
        const inp = document.getElementById('c-in');
        const btn = document.getElementById('c-btn');
        if(!inp.value || chatCooldown) return;
        socket.emit('send_message', { userId: me.userId, username: me.username, text: inp.value });
        inp.value = '';
        if(String(me.userId) !== OWNER_ID) {
            chatCooldown = true; btn.disabled = true;
            setTimeout(() => { chatCooldown = false; btn.disabled = false; }, 2000);
        }
    };

    window.clickGem = () => socket.emit('gem_click', { userId: me.userId });
    window.createFlip = () => socket.emit('create_flip', { userId: me.userId, username: me.username, amount: parseInt(document.getElementById('f-amt').value), side: 'Heads' });
    window.admGive = () => fetch("/api/admin/give", { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ adminId: me.userId, targetId: document.getElementById('a-id').value, amount: document.getElementById('a-qty').value }) });
    window.admBan = () => { if(confirm("Ban ID?")) fetch("/api/admin/ban", { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ adminId: me.userId, targetId: document.getElementById('a-id').value }) }); };

    socket.on('chat_history', h => h.forEach(m => addMsg(m)));
    socket.on('new_message', m => addMsg(m));
    socket.on('update_balance', d => { if(me && d.userId === me.userId) { me.balance = d.newBalance; me.wagered = d.wagered; document.getElementById('b-txt').innerText = d.newBalance.toLocaleString(); document.getElementById('w-txt').innerText = d.wagered.toLocaleString(); } });
    socket.on('list_flips', f => { document.getElementById('f-list').innerHTML = f.map(g => `<div style="background:#1a1a1a; padding:10px; margin-bottom:5px; border-radius:5px;">${g.creator.username}: ${g.creator.amount} <button onclick="socket.emit('join_flip', {gameId:${g.id}, userId:'${me.userId}'})">JOIN</button></div>`).join(''); });

    function addMsg(m) {
        const d = document.createElement('div');
        d.className = m.role === 'OWNER' ? 'msg-owner' : '';
        d.innerHTML = `<b>${m.username}:</b> ${m.text}`;
        document.getElementById('chat-msgs').appendChild(d);
        document.getElementById('chat-msgs').scrollTop = 9999;
    }

    if(me) {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('u-name').innerText = me.username;
        document.getElementById('u-pfp').src = me.pfp;
        socket.emit('join', me.userId); loadLB();
        if(String(me.userId) === OWNER_ID) document.getElementById('adm-btn').classList.remove('hidden');
    }
</script>
</body>
</html>
