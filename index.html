<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity | Clicker & PvP</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; flex-shrink: 0; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
        #content { flex: 1; padding: 30px; overflow-y: auto; background: #0b0b0b; }
        #chat-side { width: 300px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

        .nav-btn { padding: 12px; border-radius: 8px; cursor: pointer; color: #888; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover { background: #1a1a1a; color: #fff; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        #status-container { position: fixed; bottom: 15px; right: 315px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 11px; z-index: 1000; }
        #status-light { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; }
        #status-light.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #181818; padding: 10px; border-radius: 8px; line-height: 1.4; }
        .msg-owner { border-left: 3px solid var(--owner); color: var(--owner); }
        
        .hidden { display: none !important; }
        #click-circle { width: 160px; height: 160px; background: radial-gradient(circle, var(--accent) 0%, #000 100%); border-radius: 50%; margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid #1a1a1a; transition: 0.1s; user-select: none; }
        #click-circle:active { transform: scale(0.92); }
        .flip-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="status-container">
        <div id="status-light"></div>
        <span id="status-text">Connecting...</span>
    </div>

    <header>
        <div style="font-weight:900; font-size: 1.2rem;">BGSI <span style="color:var(--accent);">INFINITY</span></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="text-align: right;">
                <div id="nav-user" style="font-weight: bold; font-size: 14px;">Guest</div>
                <div style="font-size: 10px; color: var(--accent);">LVL <span id="lvl-display">1</span></div>
            </div>
            <img id="nav-pfp" style="width:38px; height:38px; border-radius:50%; border: 2px solid var(--accent); background:#111;">
        </div>
    </header>

    <div class="main-layout">
        <div id="sidebar">
            <div class="nav-btn active" id="btn-dash" onclick="showTab('dash')">Dashboard</div>
            <div class="nav-btn" id="btn-clicker" onclick="showTab('clicker')">Gem Clicker</div>
            <div class="nav-btn" id="btn-flip" onclick="showTab('flip')">PvP Coinflip</div>
            <div id="nav-admin" class="nav-btn hidden" style="color:var(--owner); border: 1px dashed var(--owner);" onclick="showTab('admin')">ADMIN</div>
        </div>

        <div id="content">
            <div id="tab-dash">
                <div style="display:flex; gap:20px; margin-bottom: 30px;">
                    <div style="background:var(--card); padding:25px; border-radius:15px; flex:1; border: 1px solid var(--border);">
                        <p style="color:#888; margin:0; font-size: 12px;">Gems Balance</p>
                        <h1 id="bal-text" style="color:var(--accent); margin: 5px 0 0 0;">0</h1>
                    </div>
                    <div style="background:var(--card); padding:25px; border-radius:15px; flex:1; border: 1px solid var(--border);">
                        <p style="color:#888; margin:0; font-size: 12px;">Total Wagered</p>
                        <h1 id="wagered-text" style="margin: 5px 0 0 0;">0</h1>
                    </div>
                </div>
                <h2 style="text-align:center;">🏆 Top Wagerers</h2>
                <div id="podium" style="display:flex; justify-content:center; align-items:flex-end; gap:15px; height:200px; padding-bottom: 10px;"></div>
            </div>

            <div id="tab-clicker" class="hidden" style="text-align:center;">
                <h1>Gem Clicker</h1>
                <div id="click-circle" onclick="window.handleGemClick()">💎</div>
                <h3 id="click-val" style="color:var(--accent);">+1 per click</h3>
            </div>

            <div id="tab-flip" class="hidden">
                <input type="number" id="bet-amt" placeholder="Bet Amount">
                <select id="bet-side"><option value="Heads">Heads</option><option value="Tails">Tails</option></select>
                <button class="btn-main" onclick="window.createFlip()">CREATE FLIP</button>
                <div id="flip-list" style="margin-top:20px;"></div>
            </div>

            <div id="tab-admin" class="hidden">
                <h1>Admin Panel</h1>
                <input type="text" id="admin-target" placeholder="Target User ID">
                <input type="number" id="admin-qty" placeholder="Amount">
                <button class="btn-main" onclick="window.adminGive()">GIVE GEMS</button>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
                <input type="text" id="admin-ann" placeholder="Announcement text...">
                <button class="btn-main" style="background:var(--owner); color:white;" onclick="window.adminAnnounce()">ANNOUNCE</button>
            </div>
        </div>

        <div id="chat-side">
            <div id="chat-msgs"></div>
            <div style="padding: 15px; background: #0e0e0e; border-top: 1px solid var(--border);">
                <input type="text" id="chat-in" placeholder="Type a message..." style="margin:0;" onkeypress="if(event.key==='Enter') window.sendChat()">
            </div>
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:99999; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:40px; border-radius:20px; width:340px; text-align:center; border: 1px solid var(--border);">
            <h2 id="auth-title">Login to BGSI</h2>
            <div id="auth-step-1">
                <input type="text" id="login-user" placeholder="Roblox Username">
                <input type="text" id="login-id" placeholder="Roblox User ID">
                <button class="btn-main" onclick="window.startAuth()">NEXT</button>
            </div>
            <div id="auth-step-2" class="hidden">
                <p>Put this code in your Roblox Bio:</p>
                <div id="auth-code" style="color:var(--accent); font-size:28px; font-weight:900; margin:20px 0; background:#000; padding:10px; border-radius:10px;"></div>
                <button class="btn-main" onclick="window.verifyAuth()">I'VE ADDED IT</button>
                <p style="font-size:11px; color:#555; margin-top:10px; cursor:pointer;" onclick="location.reload()">Back</p>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://bgsi-infinity.onrender.com");
        const OWNER_ID = "7957630713"; 
        let me = JSON.parse(localStorage.getItem('user_session')) || null;
        let authTemp = {};

        // --- SERVER STATUS & HISTORY ---
        socket.on('connect', () => {
            document.getElementById('status-light').className = 'online';
            document.getElementById('status-text').innerText = 'Server Online';
            if(me) {
                socket.emit('join', me.userId);
                loadLeaderboard();
            }
        });

        socket.on('chat_history', (history) => {
            const container = document.getElementById('chat-msgs');
            container.innerHTML = ''; // Clear current
            history.forEach(m => addMessageToUI(m));
        });

        function addMessageToUI(m) {
            const d = document.createElement('div');
            d.className = 'msg ' + (m.role === 'OWNER' ? 'msg-owner' : '');
            d.innerHTML = `<b>${m.username}:</b> ${m.text}`;
            const container = document.getElementById('chat-msgs');
            container.appendChild(d);
            container.scrollTop = container.scrollHeight;
        }

        function showTab(t) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
        }

        // --- LEADERBOARD ---
        async function loadLeaderboard() {
            try {
                const res = await fetch("/api/leaderboard");
                const top = await res.json();
                const podiumEl = document.getElementById('podium');
                if(!top || top.length === 0) return;

                const visualOrder = [];
                if (top[1]) visualOrder.push(top[1]);
                if (top[0]) visualOrder.push(top[0]);
                if (top[2]) visualOrder.push(top[2]);

                const colors = { 1: "#ffd700", 2: "#c0c0c0", 3: "#cd7f32" };
                const heights = { 1: "130px", 2: "90px", 3: "70px" };

                podiumEl.innerHTML = visualOrder.map(p => `
                    <div style="text-align:center; width: 80px;">
                        <div style="font-size:10px; margin-bottom:4px;">${p.username}</div>
                        <div style="background:${colors[p.rank]}; height:${heights[p.rank]}; border-radius:8px 8px 0 0; color:#000; font-weight:bold; display:flex; flex-direction:column; justify-content:center; align-items:center;">
                            #${p.rank}<br><span style="font-size:9px;">${p.wagered}</span>
                        </div>
                    </div>`).join('');
            } catch(e) { console.log("LB failed to load"); }
        }

        // --- AUTH ---
        window.startAuth = () => {
            const u = document.getElementById('login-user').value;
            const id = document.getElementById('login-id').value;
            if(!u || !id) return alert("Fill all fields");
            authTemp = { username: u, userId: id, code: "BGS-"+Math.floor(Math.random()*9999) };
            document.getElementById('auth-code').innerText = authTemp.code;
            document.getElementById('auth-step-1').classList.add('hidden');
            document.getElementById('auth-step-2').classList.remove('hidden');
        };

        window.verifyAuth = async () => {
            try {
                const res = await fetch("/api/verify-bio", { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({...authTemp, expectedCode: authTemp.code}) 
                });
                const d = await res.json();
                if(d.success) {
                    const pfp = await fetch("/api/roblox-pfp/"+authTemp.userId).then(r=>r.json());
                    me = { ...d.data, userId: authTemp.userId, pfp: pfp.pfpUrl };
                    localStorage.setItem('user_session', JSON.stringify(me));
                    location.reload();
                } else alert(d.message);
            } catch(e) { alert("Server is waking up. Check status light!"); }
        };

        // --- ACTIONS ---
        window.handleGemClick = () => socket.emit('gem_click', { userId: me.userId });
        window.createFlip = () => {
            const amt = parseInt(document.getElementById('bet-amt').value);
            if(amt > me.balance) return alert("Not enough gems!");
            socket.emit('create_flip', { userId: me.userId, username: me.username, pfp: me.pfp, amount: amt, side: document.getElementById('bet-side').value });
        };
        window.sendChat = () => {
            const val = document.getElementById('chat-in').value;
            if(!val) return;
            socket.emit('send_message', { userId: me.userId, username: me.username, text: val });
            document.getElementById('chat-in').value = '';
        };

        window.adminGive = async () => {
            await fetch("/api/admin/give", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ adminId: me.userId, targetId: document.getElementById('admin-target').value, amount: document.getElementById('admin-qty').value }) });
            alert("Done");
        };

        window.adminAnnounce = async () => {
            await fetch("/api/admin/announce", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ adminId: me.userId, message: document.getElementById('admin-ann').value }) });
        };

        socket.on('new_message', m => addMessageToUI(m));
        socket.on('update_balance', d => {
            if(me && d.userId === me.userId) {
                me.balance = d.newBalance; me.wagered = d.wagered;
                document.getElementById('bal-text').innerText = d.newBalance.toLocaleString();
                document.getElementById('wagered-text').innerText = d.wagered.toLocaleString();
                loadLeaderboard();
            }
        });
        socket.on('list_flips', flips => {
            document.getElementById('flip-list').innerHTML = flips.map(g => `
                <div class="flip-card">
                    <span><b>${g.creator.username}</b>: ${g.creator.amount}</span>
                    ${g.creator.userId === me.userId ? `<button class="btn-main" style="width:auto; background:#ff4444;" onclick="socket.emit('cancel_flip', ${g.id})">CANCEL</button>` : `<button class="btn-main" style="width:auto;" onclick="socket.emit('join_flip', {gameId:${g.id}, userId:'${me.userId}'})">JOIN</button>`}
                </div>`).join('');
        });

        if(me) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('nav-user').innerText = me.username;
            document.getElementById('nav-pfp').src = me.pfp;
            if(me.userId === OWNER_ID) document.getElementById('nav-admin').classList.remove('hidden');
        }
    </script>
</body>
</html>
