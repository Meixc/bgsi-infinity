<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGSI Infinity | Clicker & Leaderboard</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; }
        #content { flex: 1; padding: 30px; overflow-y: auto; }
        #chat-side { width: 300px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-btn { padding: 12px; border-radius: 8px; cursor: pointer; color: #888; font-weight: bold; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; }
        .hidden { display: none !important; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #181818; padding: 8px; border-radius: 8px; }
        .msg-owner { color: var(--owner); border-left: 3px solid var(--owner); }
        #click-circle { width: 160px; height: 160px; background: radial-gradient(circle, var(--accent) 0%, #000 100%); border-radius: 50%; margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid #1a1a1a; transition: 0.1s; }
        #click-circle:active { transform: scale(0.9); }
        #game-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h2 id="anim-winner" style="color:var(--accent);">FLIPPING...</h2>
    </div>

    <header>
        <div style="font-weight:900;">BGSI <span style="color:var(--accent);">INFINITY</span></div>
        <div style="display:flex; align-items:center; gap:10px;">
            <span id="nav-user">Guest</span>
            <img id="nav-pfp" style="width:35px; border-radius:50%; background:#111;">
        </div>
    </header>

    <div class="main-layout">
        <div id="sidebar">
            <div class="nav-btn active" onclick="showTab('dash')">Dashboard</div>
            <div class="nav-btn" onclick="showTab('clicker')">Gem Clicker</div>
            <div class="nav-btn" onclick="showTab('flip')">PvP Coinflip</div>
            <div id="nav-admin" class="nav-btn hidden" style="color:var(--owner);" onclick="showTab('admin')">ADMIN</div>
        </div>

        <div id="content">
            <div id="tab-dash">
                <div style="display:flex; gap:20px;">
                    <div style="background:var(--card); padding:20px; border-radius:12px; flex:1;">
                        <p style="color:#888;">Gems Balance</p>
                        <h1 id="bal-text" style="color:var(--accent);">0</h1>
                    </div>
                    <div style="background:var(--card); padding:20px; border-radius:12px; flex:1;">
                        <p style="color:#888;">Total Wagered</p>
                        <h1 id="wagered-text">0</h1>
                    </div>
                </div>

                <h2 style="margin-top:40px; text-align:center;">🏆 Top Wagerers</h2>
                <div id="podium" style="display:flex; justify-content:center; align-items:flex-end; gap:15px; height:180px; margin-top:20px;"></div>
            </div>

            <div id="tab-clicker" class="hidden" style="text-align:center;">
                <h1>Click to Earn</h1>
                <div id="click-circle" onclick="window.handleGemClick()">💎</div>
                <h3 id="click-val">+1 per click</h3>
            </div>

            <div id="tab-flip" class="hidden">
                <input type="number" id="bet-amt" placeholder="Bet Amount">
                <select id="bet-side"><option>Heads</option><option>Tails</option></select>
                <button class="btn-main" onclick="window.createFlip()">CREATE FLIP</button>
                <div id="flip-list" style="margin-top:20px;"></div>
            </div>

            <div id="tab-admin" class="hidden">
                <h3>Give Gems</h3>
                <input type="text" id="admin-target" placeholder="User ID">
                <input type="number" id="admin-qty" placeholder="Amount">
                <button class="btn-main" onclick="window.adminGive()">SEND</button>
            </div>
        </div>

        <div id="chat-side">
            <div id="chat-msgs"></div>
            <input type="text" id="chat-in" placeholder="Type message..." style="margin:10px;" onkeypress="if(event.key==='Enter') window.sendChat()">
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:99999; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:30px; border-radius:15px; width:300px; text-align:center;">
            <h2>Login</h2>
            <div id="auth-step-1">
                <input type="text" id="login-user" placeholder="Username">
                <input type="text" id="login-id" placeholder="User ID">
                <button class="btn-main" onclick="window.startAuth()">NEXT</button>
            </div>
            <div id="auth-step-2" class="hidden">
                <p>Add to Bio: <b id="auth-code" style="color:var(--accent);"></b></p>
                <button class="btn-main" onclick="window.verifyAuth()">VERIFY</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://bgsi-infinity.onrender.com");
        let me = JSON.parse(localStorage.getItem('user_session')) || null;
        let authTemp = {};

        function showTab(t) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
        }

        window.startAuth = () => {
            authTemp = { username: document.getElementById('login-user').value, userId: document.getElementById('login-id').value, code: "BGS-"+Math.floor(Math.random()*9999) };
            document.getElementById('auth-code').innerText = authTemp.code;
            document.getElementById('auth-step-1').classList.add('hidden');
            document.getElementById('auth-step-2').classList.remove('hidden');
        };

        window.verifyAuth = async () => {
            const res = await fetch("/api/verify-bio", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...authTemp, expectedCode: authTemp.code}) });
            const d = await res.json();
            if(d.success) {
                const pfp = await fetch("/api/roblox-pfp/"+authTemp.userId).then(r=>r.json());
                me = { ...d.data, userId: authTemp.userId, pfp: pfp.pfpUrl };
                localStorage.setItem('user_session', JSON.stringify(me));
                location.reload();
            }
        };

        async function loadLeaderboard() {
            const res = await fetch("/api/leaderboard");
            const top = await res.json();
            const order = [top[1], top[0], top[2]].filter(p => p);
            const colors = ["#c0c0c0", "#ffd700", "#cd7f32"];
            document.getElementById('podium').innerHTML = order.map((p, i) => `
                <div style="text-align:center;">
                    <div style="font-size:10px;">${p.username}</div>
                    <div style="background:${colors[i] || '#222'}; width:70px; height:${p.rank===1?'120px':p.rank===2?'90px':'70px'}; border-radius:5px 5px 0 0; color:#000; font-weight:bold; display:flex; flex-direction:column; justify-content:center;">
                        #${p.rank}<br><span style="font-size:9px;">${p.wagered}</span>
                    </div>
                </div>`).join('');
        }

        window.handleGemClick = () => socket.emit('gem_click', { userId: me.userId });
        window.createFlip = () => socket.emit('create_flip', { userId: me.userId, username: me.username, pfp: me.pfp, amount: parseInt(document.getElementById('bet-amt').value), side: document.getElementById('bet-side').value });
        window.sendChat = () => { socket.emit('send_message', { userId: me.userId, username: me.username, text: document.getElementById('chat-in').value }); document.getElementById('chat-in').value = ''; };

        socket.on('update_balance', d => { if(me && d.userId === me.userId) { document.getElementById('bal-text').innerText = d.newBalance.toLocaleString(); document.getElementById('wagered-text').innerText = d.wagered.toLocaleString(); } });
        socket.on('new_message', m => { const d = document.createElement('div'); d.className = 'msg '+(m.role==='OWNER'?'msg-owner':''); d.innerHTML = `<b>${m.username}:</b> ${m.text}`; document.getElementById('chat-msgs').appendChild(d); document.getElementById('chat-msgs').scrollTop = 9999; });
        socket.on('list_flips', f => { document.getElementById('flip-list').innerHTML = f.map(g => `<div style="background:var(--card); padding:10px; margin-bottom:5px; display:flex; justify-content:space-between;"><span>${g.creator.username}: ${g.creator.amount}</span> <button onclick="socket.emit('join_flip', {gameId:${g.id}, userId:'${me.userId}'})">JOIN</button></div>`).join(''); });

        if(me) {
            document.getElementById('auth-overlay').style.display='none';
            document.getElementById('nav-user').innerText = me.username;
            document.getElementById('nav-pfp').src = me.pfp;
            if(me.userId === OWNER_ID) document.getElementById('nav-admin').classList.remove('hidden');
            socket.emit('join', me.userId);
            loadLeaderboard();
        }
    </script>
</body>
</html>
