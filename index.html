<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGSI Infinity | PvP & Admin Control</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Navigation & Layout */
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 100; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; }
        #content { flex: 1; padding: 30px; overflow-y: auto; }
        #chat-side { width: 300px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }

        /* UI Elements */
        .nav-btn { padding: 12px; border-radius: 8px; cursor: pointer; color: #888; margin-bottom: 5px; font-weight: bold; transition: 0.2s; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:hover { opacity: 0.8; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }

        /* Chat */
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; font-size: 13px; }
        .msg { background: #181818; padding: 8px 12px; border-radius: 8px; border-left: 3px solid transparent; }
        .msg-owner { border-left-color: var(--owner); background: rgba(255, 0, 255, 0.05); }

        /* Animation Overlay */
        #game-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .coin-visual { width: 120px; height: 120px; background: #ffd700; border-radius: 50%; border: 8px solid #b8860b; display: flex; align-items: center; justify-content: center; font-size: 50px; color: #000; font-weight: 900; margin: 30px; }
        .spinning { animation: spin 0.1s linear infinite; }
        @keyframes spin { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(180deg); } }
        .player-card img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #333; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-card { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="game-overlay">
        <div style="display:flex; align-items:center; gap:50px;">
            <div class="player-card"><img id="anim-p1" src=""><p id="anim-n1"></p></div>
            <div id="coin-obj" class="coin-visual">?</div>
            <div class="player-card"><img id="anim-p2" src=""><p id="anim-n2"></p></div>
        </div>
        <h1 id="anim-winner" style="color:var(--accent); margin-top:20px;">FLIPPING...</h1>
    </div>

    <div id="profile-modal" class="modal-overlay" onclick="closeProfile()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <img id="modal-pfp" style="width:80px; border-radius:50%; border:3px solid var(--accent);">
            <h2 id="modal-user" style="margin-top:10px;">User</h2>
            <div style="background:#000; padding:15px; border-radius:10px; text-align:left; margin-top:20px;">
                <p>Level: <b id="modal-lvl" style="color:var(--accent);">1</b></p>
                <p>Wagered: <b id="modal-wager">0</b></p>
                <p>Balance: <b id="modal-bal">0</b></p>
            </div>
            <button class="btn-main" style="margin-top:20px; background:#222; color:#fff;" onclick="closeProfile()">CLOSE</button>
        </div>
    </div>

    <header>
        <div style="font-weight:900;">BGSI <span style="color:var(--accent);">INFINITY</span></div>
        <div onclick="openProfile()" style="cursor:pointer; display:flex; align-items:center; gap:10px;">
            <span id="nav-user">Guest</span>
            <img id="nav-pfp" src="" style="width:35px; height:35px; border-radius:50%; border:2px solid var(--accent); background:#111;">
        </div>
    </header>

    <div class="main-layout">
        <div id="sidebar">
            <div class="nav-btn active" id="btn-dash" onclick="showTab('dash')">Dashboard</div>
            <div class="nav-btn" id="btn-flip" onclick="showTab('flip')">PvP Coinflip</div>
            <div class="nav-btn" id="btn-lb" onclick="showTab('lb')">Leaderboard</div>
            <div id="nav-admin" class="nav-btn hidden" style="color:var(--owner);" onclick="showTab('admin')">ADMIN PANEL</div>
        </div>

        <div id="content">
            <div id="tab-dash">
                <h1>Welcome Back</h1>
                <div style="background:var(--card); padding:30px; border-radius:15px; display:inline-block; min-width:250px; border:1px solid var(--border);">
                    <p style="color:#888; margin:0;">Gems Balance</p>
                    <h2 id="main-bal-text" style="font-size:40px; color:var(--accent); margin:10px 0;">0</h2>
                </div>
            </div>

            <div id="tab-flip" class="hidden">
                <h1>PvP Coinflip</h1>
                <div style="background:var(--card); padding:20px; border-radius:15px; border:1px solid var(--border); max-width:400px; margin-bottom:30px;">
                    <h3>Create Game</h3>
                    <input type="number" id="bet-amt" placeholder="Enter amount">
                    <select id="bet-side"><option>Heads</option><option>Tails</option></select>
                    <button class="btn-main" onclick="createFlip()">CREATE PVP GAME</button>
                </div>
                <h3>Active Games</h3>
                <div id="flip-list"></div>
            </div>

            <div id="tab-admin" class="hidden">
                <h1>Owner Admin</h1>
                <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--accent); margin-bottom:20px;">
                    <h3 style="color:var(--accent);">Give Gems</h3>
                    <input type="text" id="admin-target" placeholder="Roblox User ID">
                    <input type="number" id="admin-qty" placeholder="Amount">
                    <button class="btn-main" onclick="adminGive()">SEND GEMS</button>
                </div>
                <div style="background:var(--card); padding:20px; border-radius:12px; border:1px solid var(--owner);">
                    <h3 style="color:var(--owner);">Announcement</h3>
                    <input type="text" id="admin-ann" placeholder="Message to all users...">
                    <button class="btn-main" style="background:var(--owner); color:#fff;" onclick="adminAnnounce()">BROADCAST</button>
                </div>
            </div>
        </div>

        <div id="chat-side">
            <div style="padding:15px; border-bottom:1px solid var(--border); font-weight:bold;">Global Chat</div>
            <div id="chat-msgs"></div>
            <div style="padding:15px; border-top:1px solid var(--border);">
                <input type="text" id="chat-in" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>

    <div id="auth-overlay" class="modal-overlay" style="display:flex;">
        <div class="modal-card">
            <h2>Login</h2>
            <div id="auth-step-1">
                <input type="text" id="login-user" placeholder="Username">
                <input type="text" id="login-id" placeholder="User ID">
                <button class="btn-main" onclick="startAuth()">NEXT</button>
            </div>
            <div id="auth-step-2" class="hidden">
                <p>Add this to your Bio:</p>
                <div id="auth-code" style="background:#000; padding:15px; color:var(--accent); font-weight:bold; font-size:22px; margin:15px 0;"></div>
                <button class="btn-main" onclick="verifyAuth()">VERIFY</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://bgsi-infinity.onrender.com");
        let me = JSON.parse(localStorage.getItem('user_session')) || null;
        let authTemp = {};

        function showTab(t) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            document.getElementById('btn-'+t).classList.add('active');
        }

        // --- AUTH ---
        function startAuth() {
            authTemp.username = document.getElementById('login-user').value;
            authTemp.userId = document.getElementById('login-id').value;
            authTemp.code = "BGS-" + Math.floor(1000 + Math.random() * 9000);
            document.getElementById('auth-code').innerText = authTemp.code;
            document.getElementById('auth-step-1').classList.add('hidden');
            document.getElementById('auth-step-2').classList.remove('hidden');
        }

        async function verifyAuth() {
            const res = await fetch("http://localhost:3000/api/verify-bio", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId: authTemp.userId, username: authTemp.username, expectedCode: authTemp.code })
            });
            const d = await res.json();
            if(d.success) {
                const pfp = await fetch("http://localhost:3000/api/roblox-pfp/"+authTemp.userId).then(r=>r.json());
                me = { ...d.data, userId: authTemp.userId, pfp: pfp.pfpUrl };
                localStorage.setItem('user_session', JSON.stringify(me));
                initSession();
            } else { alert(d.message); }
        }

        function initSession() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('nav-user').innerText = me.username;
            document.getElementById('nav-pfp').src = me.pfp;
            document.getElementById('main-bal-text').innerText = me.balance.toLocaleString();
            if(me.userId === "7957630713") document.getElementById('nav-admin').classList.remove('hidden');
            socket.emit('join', me.userId);
        }

        // --- PROFILE ---
        function openProfile() {
            document.getElementById('modal-user').innerText = me.username;
            document.getElementById('modal-pfp').src = me.pfp;
            document.getElementById('modal-bal').innerText = me.balance.toLocaleString();
            document.getElementById('modal-wager').innerText = me.wagered.toLocaleString();
            document.getElementById('modal-lvl').innerText = Math.floor(Math.sqrt(me.wagered / 100)) + 1;
            document.getElementById('profile-modal').style.display = 'flex';
        }
        function closeProfile() { document.getElementById('profile-modal').style.display = 'none'; }

        // --- CHAT & ADMIN ---
        function sendChat() {
            const txt = document.getElementById('chat-in').value;
            socket.emit('send_message', { userId: me.userId, username: me.username, text: txt });
            document.getElementById('chat-in').value = '';
        }

        async function adminGive() {
            const t = document.getElementById('admin-target').value;
            const q = document.getElementById('admin-qty').value;
            await fetch("http://localhost:3000/api/admin/give", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: me.userId, targetId: t, amount: q })
            });
            alert("Sent!");
        }

        async function adminAnnounce() {
            const msg = document.getElementById('admin-ann').value;
            await fetch("http://localhost:3000/api/admin/announce", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ adminId: me.userId, message: msg })
            });
        }

        // --- GAME ---
        function createFlip() {
            const amt = parseInt(document.getElementById('bet-amt').value);
            const side = document.getElementById('bet-side').value;
            socket.emit('create_flip', { userId: me.userId, username: me.username, pfp: me.pfp, amount: amt, side });
        }

        socket.on('flip_results', d => {
            const overlay = document.getElementById('game-overlay');
            document.getElementById('anim-p1').src = d.creatorPfp;
            document.getElementById('anim-n1').innerText = d.creatorName;
            document.getElementById('anim-p2').src = d.joinerPfp;
            document.getElementById('anim-n2').innerText = d.joinerName;
            
            overlay.style.display = 'flex';
            document.getElementById('coin-obj').classList.add('spinning');

            setTimeout(() => {
                document.getElementById('coin-obj').classList.remove('spinning');
                document.getElementById('coin-obj').innerText = d.resultSide[0];
                document.getElementById('anim-winner').innerText = d.winnerName + " WON!";
                setTimeout(() => { 
                    overlay.style.display = 'none';
                    document.getElementById('anim-winner').innerText = "FLIPPING...";
                }, 3000);
            }, 2000);
        });

        socket.on('list_flips', flips => {
            document.getElementById('flip-list').innerHTML = flips.map(f => `
                <div style="background:var(--card); padding:15px; border-radius:10px; border:1px solid var(--border); margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${f.creator.username}</b>: ${f.creator.amount} Gems (${f.creator.side})</span>
                    <div>
                        ${f.creator.userId === me.userId ? 
                            `<button style="color:#ff4444; background:none; border:1px solid #ff4444; padding:5px; cursor:pointer;" onclick="socket.emit('cancel_flip', ${f.id})">CANCEL</button>` : 
                            `<button style="background:var(--accent); padding:5px 15px; cursor:pointer;" onclick="socket.emit('join_flip', {gameId: ${f.id}, userId: '${me.userId}'})">JOIN</button>`
                        }
                    </div>
                </div>
            `).join('');
        });

        socket.on('new_message', m => {
            const div = document.createElement('div');
            div.className = 'msg ' + (m.role === 'OWNER' ? 'msg-owner' : '');
            div.innerHTML = `<b>${m.username}:</b> ${m.text}`;
            document.getElementById('chat-msgs').appendChild(div);
            document.getElementById('chat-msgs').scrollTop = 99999;
        });

        socket.on('update_balance', d => {
            if(d.userId === me.userId) {
                me.balance = d.newBalance;
                document.getElementById('main-bal-text').innerText = me.balance.toLocaleString();
            }
        });

        if(me) initSession();
    </script>
</body>

</html>
