<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGSI Infinity | Clicker & PvP</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; --text: #ffffff; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Layout */
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 30px; flex-shrink: 0; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 220px; background: var(--card); border-right: 1px solid var(--border); padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
        #content { flex: 1; padding: 30px; overflow-y: auto; background: #0b0b0b; }
        #chat-side { width: 300px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

        /* UI Elements */
        .nav-btn { padding: 12px; border-radius: 8px; cursor: pointer; color: #888; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover { background: #1a1a1a; color: #fff; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-main:hover { opacity: 0.8; transform: translateY(-1px); }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        
        /* Status Indicator */
        #status-container { position: fixed; bottom: 15px; right: 315px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); font-size: 11px; z-index: 1000; }
        #status-light { width: 8px; height: 8px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 8px #ff4444; transition: 0.3s; }
        #status-light.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* Chat */
        #chat-msgs { flex: 1; overflow-y: auto; padding: 15px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
        .msg { background: #181818; padding: 10px; border-radius: 8px; line-height: 1.4; word-wrap: break-word; }
        .msg-owner { border-left: 3px solid var(--owner); color: var(--owner); }
        
        .hidden { display: none !important; }
        #click-circle { width: 160px; height: 160px; background: radial-gradient(circle, var(--accent) 0%, #000 100%); border-radius: 50%; margin: 30px auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid #1a1a1a; transition: 0.1s; user-select: none; }
        #click-circle:active { transform: scale(0.92); }
        #game-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .flip-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="status-container">
        <div id="status-light"></div>
        <span id="status-text">Server Offline</span>
    </div>

    <div id="game-overlay">
        <h2 id="anim-winner" style="color:var(--accent); font-size: 2rem;">FLIPPING...</h2>
    </div>

    <header>
        <div style="font-weight:900; font-size: 1.2rem; letter-spacing: 1px;">BGSI <span style="color:var(--accent);">INFINITY</span></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="text-align: right;">
                <div id="nav-user" style="font-weight: bold; font-size: 14px;">Guest</div>
                <div style="font-size: 10px; color: var(--accent);">LVL <span id="lvl-display">1</span></div>
            </div>
            <img id="nav-pfp" style="width:38px; height:38px; border-radius:50%; border: 2px solid var(--accent); background:#111;">
        </div>
    </header>

    <div class="main-layout">
        <div id="sidebar">
            <div class="nav-btn active" id="btn-dash" onclick="showTab('dash')">Dashboard</div>
            <div class="nav-btn" id="btn-clicker" onclick="showTab('clicker')">Gem Clicker</div>
            <div class="nav-btn" id="btn-flip" onclick="showTab('flip')">PvP Coinflip</div>
            <div id="nav-admin" class="nav-btn hidden" style="color:var(--owner); border: 1px dashed var(--owner); margin-top: 10px;" onclick="showTab('admin')">ADMIN PANEL</div>
        </div>

        <div id="content">
            <div id="tab-dash">
                <div style="display:flex; gap:20px; margin-bottom: 30px;">
                    <div style="background:var(--card); padding:25px; border-radius:15px; flex:1; border: 1px solid var(--border);">
                        <p style="color:#888; margin:0; font-size: 12px; text-transform: uppercase;">Gems Balance</p>
                        <h1 id="bal-text" style="color:var(--accent); margin: 5px 0 0 0; font-size: 2.5rem;">0</h1>
                    </div>
                    <div style="background:var(--card); padding:25px; border-radius:15px; flex:1; border: 1px solid var(--border);">
                        <p style="color:#888; margin:0; font-size: 12px; text-transform: uppercase;">Total Wagered</p>
                        <h1 id="wagered-text" style="margin: 5px 0 0 0; font-size: 2.5rem;">0</h1>
                    </div>
                </div>
                <h2 style="text-align:center; margin-bottom: 10px;">🏆 Top 3 Wagerers</h2>
                <div id="podium" style="display:flex; justify-content:center; align-items:flex-end; gap:15px; height:200px; padding-bottom: 20px; border-bottom: 1px solid var(--border);"></div>
            </div>

            <div id="tab-clicker" class="hidden" style="text-align:center; padding-top: 50px;">
                <h1 style="margin:0;">Gem Clicker</h1>
                <div id="click-circle" onclick="window.handleGemClick()">💎</div>
                <h3 id="click-val" style="color:var(--accent); font-size: 1.5rem;">+1 per click</h3>
            </div>

            <div id="tab-flip" class="hidden">
                <div style="background:var(--card); padding:25px; border-radius:15px; border:1px solid var(--border); margin-bottom:30px;">
                    <h3 style="margin-top:0;">Create a Coinflip</h3>
                    <div style="display:grid; grid-template-columns: 1fr 1fr auto; gap: 10px;">
                        <input type="number" id="bet-amt" placeholder="Amount">
                        <select id="bet-side"><option value="Heads">Heads</option><option value="Tails">Tails</option></select>
                        <button class="btn-main" onclick="window.createFlip()">HOST</button>
                    </div>
                </div>
                <h3>Active Games</h3>
                <div id="flip-list"></div>
            </div>

            <div id="tab-admin" class="hidden">
                <h1 style="color: var(--owner);">Owner Controls</h1>
                <input type="text" id="admin-target" placeholder="User ID">
                <input type="number" id="admin-qty" placeholder="Amount">
                <button class="btn-main" onclick="window.adminGive()">UPDATE BALANCE</button>
                <h3 style="margin-top:30px;">Global Announcement</h3>
                <input type="text" id="admin-ann" placeholder="Message...">
                <button class="btn-main" style="background:var(--owner); color:#fff;" onclick="window.adminAnnounce()">SEND</button>
            </div>
        </div>

        <div id="chat-side">
            <div style="padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; font-size: 14px;">Global Chat</div>
            <div id="chat-msgs"></div>
            <div style="padding: 15px; background: #0e0e0e;">
                <input type="text" id="chat-in" placeholder="Say something..." onkeypress="if(event.key==='Enter') window.sendChat()">
            </div>
        </div>
    </div>

    <div id="auth-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:99999; display:flex; align-items:center; justify-content:center;">
        <div style="background:var(--card); padding:40px; border-radius:20px; width:340px; text-align:center; border: 1px solid var(--border);">
            <h2>Login</h2>
            <div id="auth-step-1">
                <input type="text" id="login-user" placeholder="Username">
                <input type="text" id="login-id" placeholder="User ID">
                <button class="btn-main" onclick="window.startAuth()">CONTINUE</button>
            </div>
            <div id="auth-step-2" class="hidden">
                <p>Bio Code:</p>
                <div id="auth-code" style="color:var(--accent); font-size:28px; font-weight:900; margin:20px 0;"></div>
                <button class="btn-main" onclick="window.verifyAuth()">VERIFY</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io("https://bgsi-infinity.onrender.com");
        const OWNER_ID = "7957630713"; 
        let me = JSON.parse(localStorage.getItem('user_session')) || null;
        let authTemp = {};

        // --- SERVER STATUS LOGIC ---
        socket.on('connect', () => {
            document.getElementById('status-light').className = 'online';
            document.getElementById('status-text').innerText = 'Server Online';
        });
        socket.on('disconnect', () => {
            document.getElementById('status-light').className = '';
            document.getElementById('status-text').innerText = 'Server Offline';
        });

        function showTab(t) {
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(document.getElementById('btn-'+t)) document.getElementById('btn-'+t).classList.add('active');
        }

        window.startAuth = () => {
            authTemp = { username: document.getElementById('login-user').value, userId: document.getElementById('login-id').value, code: "BGS-"+Math.floor(Math.random()*9999) };
            document.getElementById('auth-code').innerText = authTemp.code;
            document.getElementById('auth-step-1').classList.add('hidden');
            document.getElementById('auth-step-2').classList.remove('hidden');
        };

        window.verifyAuth = async () => {
            try {
                const res = await fetch("/api/verify-bio", { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({...authTemp, expectedCode: authTemp.code}) });
                const d = await res.json();
                if(d.success) {
                    const pfp = await fetch("/api/roblox-pfp/"+authTemp.userId).then(r=>r.json());
                    me = { ...d.data, userId: authTemp.userId, pfp: pfp.pfpUrl };
                    localStorage.setItem('user_session', JSON.stringify(me));
                    location.reload();
                } else alert(d.message);
            } catch(e) { alert("Server error. Check the status light!"); }
        };

        window.handleGemClick = () => socket.emit('gem_click', { userId: me.userId });
        window.createFlip = () => socket.emit('create_flip', { userId: me.userId, username: me.username, pfp: me.pfp, amount: parseInt(document.getElementById('bet-amt').value), side: document.getElementById('bet-side').value });
        window.sendChat = () => { socket.emit('send_message', { userId: me.userId, username: me.username, text: document.getElementById('chat-in').value }); document.getElementById('chat-in').value = ''; };

        socket.on('update_balance', d => { if(me && d.userId === me.userId) { me.balance = d.newBalance; me.wagered = d.wagered; document.getElementById('bal-text').innerText = d.newBalance.toLocaleString(); document.getElementById('wagered-text').innerText = d.wagered.toLocaleString(); } });
        socket.on('list_flips', flips => { document.getElementById('flip-list').innerHTML = flips.map(g => `<div class="flip-card"><span>${g.creator.username}: ${g.creator.amount}</span> ${g.creator.userId === me.userId ? `<button onclick="socket.emit('cancel_flip', ${g.id})">CANCEL</button>` : `<button onclick="socket.emit('join_flip', {gameId:${g.id}, userId:'${me.userId}'})">JOIN</button>`}</div>`).join(''); });

        if(me) {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('nav-user').innerText = me.username;
            document.getElementById('nav-pfp').src = me.pfp;
            if(me.userId === OWNER_ID) document.getElementById('nav-admin').classList.remove('hidden');
            socket.emit('join', me.userId);
        }
    </script>
</body>
</html>
