<!DOCTYPE html>
<html>
<head>
    <title>BGSI Infinity</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #090909; --card: #121212; --accent: #00ff88; --owner: #ff00ff; --border: #222; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 200px; background: var(--card); border-right: 1px solid var(--border); padding: 15px; }
        #content { flex: 1; padding: 25px; overflow-y: auto; }
        #chat-side { width: 280px; background: var(--card); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .nav-btn { padding: 10px; cursor: pointer; border-radius: 5px; color: #888; margin-bottom: 5px; }
        .nav-btn.active { background: #1a1a1a; color: var(--accent); }
        .btn-main { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; margin-bottom: 10px; box-sizing: border-box; }
        #status-bar { position: fixed; bottom: 10px; left: 10px; display: flex; align-items: center; gap: 5px; font-size: 10px; }
        #light { width: 8px; height: 8px; border-radius: 50%; background: red; }
        #chat-msgs { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .msg-owner { border-left: 2px solid var(--owner); padding-left: 5px; color: var(--owner); }
        .hidden { display: none !important; }
        #podium { display: flex; justify-content: center; align-items: flex-end; gap: 10px; height: 150px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="status-bar"><div id="light"></div><span id="st-text">Offline</span></div>

<header>
    <div style="font-weight:bold; color:var(--accent);">BGSI INFINITY</div>
    <div id="nav-info" style="display:flex; align-items:center; gap:10px;">
        <span id="user-display">Guest</span>
        <img id="pfp-display" style="width:30px; border-radius:50%;">
    </div>
</header>

<div class="main-layout">
    <div id="sidebar">
        <div class="nav-btn active" onclick="tab('dash')">Dashboard</div>
        <div class="nav-btn" onclick="tab('click')">Clicker</div>
        <div class="nav-btn" onclick="tab('flip')">Coinflip</div>
        <div id="admin-btn" class="nav-btn hidden" onclick="tab('admin')" style="color:var(--owner);">ADMIN</div>
    </div>

    <div id="content">
        <div id="tab-dash">
            <div style="display:flex; gap:10px;">
                <div style="background:var(--card); padding:20px; flex:1; border-radius:10px;">
                    <div style="font-size:12px; color:#888;">GEMS</div>
                    <h2 id="bal-txt" style="color:var(--accent);">0</h2>
                </div>
                <div style="background:var(--card); padding:20px; flex:1; border-radius:10px;">
                    <div style="font-size:12px; color:#888;">WAGERED</div>
                    <h2 id="wag-txt">0</h2>
                </div>
            </div>
            <div id="podium"></div>
        </div>

        <div id="tab-click" class="hidden" style="text-align:center;">
            <div id="gem" onclick="window.clickGem()" style="font-size:80px; cursor:pointer; margin:40px;">💎</div>
            <p id="click-p">+1 per click</p>
        </div>

        <div id="tab-flip" class="hidden">
            <input type="number" id="flip-amt" placeholder="Amount">
            <button class="btn-main" onclick="window.createFlip()">CREATE FLIP</button>
            <div id="flip-list" style="margin-top:20px;"></div>
        </div>

        <div id="tab-admin" class="hidden">
            <h3>Give Gems</h3>
            <input id="adm-id" placeholder="User ID">
            <input id="adm-qty" type="number" placeholder="Gems">
            <button class="btn-main" onclick="window.admGive()">GIVE</button>
        </div>
    </div>

    <div id="chat-side">
        <div id="chat-msgs"></div>
        <div style="padding:10px;"><input id="chat-in" placeholder="Type..." onkeypress="if(event.key==='Enter')window.sendMsg()"></div>
    </div>
</div>

<div id="auth" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:999;">
    <div style="background:var(--card); padding:30px; border-radius:10px; width:300px; text-align:center;">
        <h2 id="auth-h">Login</h2>
        <div id="step1">
            <input id="log-u" placeholder="Username">
            <input id="log-i" placeholder="User ID">
            <button class="btn-main" onclick="window.next()">NEXT</button>
        </div>
        <div id="step2" class="hidden">
            <p>Code for Bio:</p>
            <h1 id="code-txt" style="color:var(--accent);"></h1>
            <button class="btn-main" onclick="window.verify()">VERIFY</button>
        </div>
    </div>
</div>

<script>
    const socket = io("https://bgsi-infinity.onrender.com");
    const OWNER_ID = "7957630713";
    let me = JSON.parse(localStorage.getItem('user_session'));

    socket.on('connect', () => {
        document.getElementById('light').style.background = '#00ff88';
        document.getElementById('st-text').innerText = 'Online';
        if(me) { socket.emit('join', me.userId); loadLB(); }
    });

    function tab(t) {
        document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
    }

    async function loadLB() {
        const res = await fetch("/api/leaderboard");
        const top = await res.json();
        const p = document.getElementById('podium');
        if(!top.length) return p.innerHTML = "No wagers yet";
        const visual = [top[1], top[0], top[2]].filter(x => x);
        const colors = {1:"#ffd700", 2:"#c0c0c0", 3:"#cd7f32"};
        const heights = {1:"100px", 2:"70px", 3:"50px"};
        p.innerHTML = visual.map(u => `
            <div style="text-align:center;">
                <div style="font-size:10px;">${u.username}</div>
                <div style="background:${colors[u.rank]}; height:${heights[u.rank]}; width:60px; border-radius:5px 5px 0 0; color:#000; font-weight:bold; display:flex; align-items:center; justify-content:center;">#${u.rank}</div>
            </div>`).join('');
    }

    window.next = () => {
        const u = document.getElementById('log-u').value;
        const i = document.getElementById('log-i').value;
        window.temp = { username: u, userId: i, code: "BGS-"+Math.floor(Math.random()*999) };
        document.getElementById('code-txt').innerText = window.temp.code;
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
    };

    window.verify = async () => {
        const res = await fetch("/api/verify-bio", { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...window.temp, expectedCode:window.temp.code}) });
        const d = await res.json();
        if(d.success) {
            const pfp = await fetch("/api/roblox-pfp/"+window.temp.userId).then(r=>r.json());
            me = { ...d.data, userId: window.temp.userId, pfp: pfp.pfpUrl };
            localStorage.setItem('user_session', JSON.stringify(me));
            location.reload();
        } else alert(d.message);
    };

    window.clickGem = () => socket.emit('gem_click', { userId: me.userId });
    window.createFlip = () => socket.emit('create_flip', { userId: me.userId, username: me.username, amount: parseInt(document.getElementById('flip-amt').value), side: 'Heads' });
    window.sendMsg = () => { socket.emit('send_message', { userId: me.userId, username: me.username, text: document.getElementById('chat-in').value }); document.getElementById('chat-in').value=''; };
    window.admGive = () => fetch("/api/admin/give", { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ adminId: me.userId, targetId: document.getElementById('adm-id').value, amount: document.getElementById('adm-qty').value }) });

    socket.on('chat_history', h => h.forEach(m => addMsg(m)));
    socket.on('new_message', m => addMsg(m));
    socket.on('update_balance', d => { if(me && d.userId === me.userId) { me.balance = d.newBalance; me.wagered = d.wagered; document.getElementById('bal-txt').innerText = d.newBalance; document.getElementById('wag-txt').innerText = d.wagered; loadLB(); } });
    socket.on('list_flips', f => { document.getElementById('flip-list').innerHTML = f.map(g => `<div style="background:#1a1a1a; padding:10px; margin-bottom:5px; border-radius:5px;">${g.creator.username}: ${g.creator.amount} <button onclick="socket.emit('join_flip', {gameId:${g.id}, userId:'${me.userId}'})">JOIN</button></div>`).join(''); });
    socket.on('flip_results', r => alert(r.winnerName + " WON!"));

    function addMsg(m) {
        const d = document.createElement('div');
        d.className = m.role === 'OWNER' ? 'msg-owner' : '';
        d.innerHTML = `<b>${m.username}:</b> ${m.text}`;
        document.getElementById('chat-msgs').appendChild(d);
        document.getElementById('chat-msgs').scrollTop = 9999;
    }

    if(me) {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('user-display').innerText = me.username;
        document.getElementById('pfp-display').src = me.pfp;
        document.getElementById('bal-txt').innerText = me.balance;
        document.getElementById('wag-txt').innerText = me.wagered;
        if(String(me.userId) === OWNER_ID) document.getElementById('admin-btn').classList.remove('hidden');
    }
</script>
</body>
</html>
